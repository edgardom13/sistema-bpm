<ion-content class="ion-no-padding bg-gray-50 dark:bg-[#0C121E]">
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      
      <!-- Logo y Título -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-amber-500/10 text-amber-500 mb-4">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Recuperar Contraseña</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">
          {{ emailSent ? 'Revisa tu bandeja de entrada' : 'Ingresa tu correo para recibir un enlace' }}
        </p>
      </div>

      <!-- Estado: Email Enviado -->
      <div *ngIf="emailSent" class="bg-white dark:bg-[#1C2434] rounded-2xl p-6 border border-gray-200 dark:border-[#2D313A] shadow-sm text-center">
        <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-emerald-500/10 flex items-center justify-center">
          <svg class="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
        </div>
        <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-2">¡Enlace Enviado!</h3>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">
          Hemos enviado un enlace de recuperación a <strong class="text-gray-900 dark:text-white">{{ email }}</strong>
        </p>
        <button 
          routerLink="/login"
          class="w-full flex items-center justify-center gap-2 bg-[#3C50E0] hover:bg-blue-700 text-white font-bold text-sm py-3 px-4 rounded-xl transition-all"
        >
          Volver al Login
        </button>
      </div>

      <!-- Estado: Formulario -->
      <div *ngIf="!emailSent" class="bg-white dark:bg-[#1C2434] rounded-2xl p-6 border border-gray-200 dark:border-[#2D313A] shadow-sm">
        <form (ngSubmit)="resetPassword()" class="space-y-4">
          
          <!-- Email -->
          <div>
            <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2">
              Correo Electrónico
            </label>
            <div class="relative">
              <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
              <input 
                type="email" 
                [(ngModel)]="email"
                name="email"
                placeholder="usuario@empresa.com"
                class="w-full bg-gray-50 dark:bg-[#121824] border border-gray-200 dark:border-[#2D313A] rounded-xl pl-10 pr-4 py-3 text-sm font-medium text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:border-[#3C50E0] focus:ring-2 focus:ring-[#3C50E0]/10 transition-all"
              >
            </div>
          </div>

          <!-- Botón Submit -->
          <button 
            type="submit"
            [disabled]="loading"
            class="w-full flex items-center justify-center gap-2 bg-[#3C50E0] hover:bg-blue-700 disabled:bg-gray-400 text-white font-bold text-sm py-3 px-4 rounded-xl shadow-lg shadow-blue-500/30 transition-all mt-6"
          >
            <div *ngIf="loading" class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
            <svg *ngIf="!loading" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            {{ loading ? 'Enviando...' : 'Enviar Enlace' }}
          </button>

        </form>

        <!-- Divider -->
        <div class="relative my-6">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-200 dark:border-[#2D313A]"></div>
          </div>
          <div class="relative flex justify-center text-xs">
            <span class="px-3 bg-white dark:bg-[#1C2434] text-gray-500 dark:text-gray-400">¿Recordaste tu contraseña?</span>
          </div>
        </div>

        <!-- Link Login -->
        <button 
          routerLink="/login"
          class="w-full flex items-center justify-center gap-2 text-sm font-semibold text-[#3C50E0] hover:text-blue-700 dark:hover:text-blue-400 transition-colors"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
          Volver al Login
        </button>
      </div>

    </div>
  </div>
</ion-content>
