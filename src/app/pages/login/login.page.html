<ion-content class="ion-no-padding">
  <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-50 via-white to-blue-50/30 dark:from-[#0C121E] dark:via-[#0C121E] dark:to-[#1C2434]/50 px-4 py-8 relative overflow-hidden">
    
    <!-- Elementos decorativos de fondo -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
      <div class="absolute -top-40 -right-40 w-96 h-96 bg-blue-500/5 dark:bg-blue-500/10 rounded-full blur-3xl"></div>
      <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-indigo-500/5 dark:bg-indigo-500/10 rounded-full blur-3xl"></div>
      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-blue-400/3 dark:bg-blue-400/5 rounded-full blur-3xl"></div>
    </div>

    <div class="w-full max-w-[440px] relative z-10">
      
      <!-- Logo y Título -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-[#3C50E0] to-blue-600 text-white mb-5 shadow-lg shadow-blue-500/30 ring-4 ring-blue-500/10">
          <svg class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 18V9a6 6 0 0 1 12 0v9M3 20h18a1 1 0 0 0 1-1v-1a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v1a1 1 0 0 0 1 1z" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white tracking-tight">Bienvenido de vuelta</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1.5">
          Ingresa a tu cuenta de <span class="font-semibold text-gray-700 dark:text-gray-300">Sistema BPM</span>
        </p>
      </div>

      <!-- Card de Login -->
      <div class="bg-white dark:bg-[#1C2434]/90 backdrop-blur-sm rounded-2xl shadow-xl shadow-gray-900/5 dark:shadow-black/20 border border-gray-200/80 dark:border-[#2D313A] p-7 sm:p-8">
        
        <!-- Mensaje de error general -->
        <div *ngIf="errorMessage" class="mb-5 p-3 rounded-xl bg-rose-50 dark:bg-rose-500/10 border border-rose-200 dark:border-rose-500/20 flex items-start gap-2.5">
          <svg class="w-4 h-4 text-rose-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
          </svg>
          <p class="text-xs font-medium text-rose-700 dark:text-rose-400">{{ errorMessage }}</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
          
          <!-- Email -->
          <div>
            <label class="block text-[11px] font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-2">
              Correo Electrónico
            </label>
            <div class="relative group">
              <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-[#3C50E0] transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
              </span>
              <input 
                type="email" 
                formControlName="email"
                class="w-full pl-10 pr-4 py-2.5 bg-gray-50 dark:bg-[#121824] border border-gray-200 dark:border-[#2D313A] rounded-lg text-sm font-medium text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:border-[#3C50E0] focus:ring-2 focus:ring-[#3C50E0]/10 focus:bg-white dark:focus:bg-[#0F1520] transition-all"
                placeholder="tu@empresa.com"
              >
            </div>
            <div *ngIf="f['email'].touched && f['email'].invalid" class="flex items-center gap-1.5 mt-1.5">
              <svg class="w-3 h-3 text-rose-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
              </svg>
              <p class="text-[11px] font-medium text-rose-500">
                <span *ngIf="f['email'].errors?.['required']">El correo es requerido</span>
                <span *ngIf="f['email'].errors?.['email']">Ingresa un correo válido</span>
              </p>
            </div>
          </div>

          <!-- Password -->
          <div>
            <div class="flex items-center justify-between mb-2">
              <label class="block text-[11px] font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider">
                Contraseña
              </label>
              <a routerLink="/forgot-password" 
                 class="text-[11px] font-semibold text-[#3C50E0] hover:text-blue-700 dark:hover:text-blue-400 transition-colors">
                ¿Olvidaste tu contraseña?
              </a>
            </div>
            <div class="relative group">
              <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-[#3C50E0] transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
              </span>
              <input 
                [type]="showPassword ? 'text' : 'password'" 
                formControlName="password"
                class="w-full pl-10 pr-10 py-2.5 bg-gray-50 dark:bg-[#121824] border border-gray-200 dark:border-[#2D313A] rounded-lg text-sm font-medium text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:border-[#3C50E0] focus:ring-2 focus:ring-[#3C50E0]/10 focus:bg-white dark:focus:bg-[#0F1520] transition-all"
                placeholder="••••••••"
              >
              <button 
                type="button" 
                (click)="showPassword = !showPassword"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors p-1"
              >
                <svg *ngIf="!showPassword" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
                <svg *ngIf="showPassword" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                </svg>
              </button>
            </div>
            <div *ngIf="f['password'].touched && f['password'].invalid" class="flex items-center gap-1.5 mt-1.5">
              <svg class="w-3 h-3 text-rose-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
              </svg>
              <p class="text-[11px] font-medium text-rose-500">
                <span *ngIf="f['password'].errors?.['required']">La contraseña es requerida</span>
              </p>
            </div>
          </div>

          <!-- Remember me -->
          <div class="flex items-center">
            <label class="flex items-center gap-2 cursor-pointer group">
              <div class="relative">
                <input 
                  type="checkbox" 
                  [(ngModel)]="rememberMe"
                  [ngModelOptions]="{standalone: true}"
                  class="peer sr-only"
                >
                <div class="w-4 h-4 border border-gray-300 dark:border-[#2D313A] rounded peer-checked:bg-[#3C50E0] peer-checked:border-[#3C50E0] transition-all flex items-center justify-center">
                  <svg class="w-3 h-3 text-white opacity-0 peer-checked:opacity-100" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                  </svg>
                </div>
              </div>
              <span class="text-xs font-medium text-gray-600 dark:text-gray-400 group-hover:text-gray-900 dark:group-hover:text-white transition-colors">
                Mantener sesión activa
              </span>
            </label>
          </div>

          <!-- Submit Button -->
          <button 
            type="submit" 
            [disabled]="loading || loginForm.invalid"
            class="w-full bg-gradient-to-r from-[#3C50E0] to-blue-600 hover:from-[#2D42D0] hover:to-blue-700 disabled:from-gray-300 disabled:to-gray-400 dark:disabled:from-gray-700 dark:disabled:to-gray-800 text-white font-semibold text-sm py-2.5 px-4 rounded-lg shadow-lg shadow-blue-500/20 hover:shadow-blue-500/30 disabled:shadow-none transition-all duration-200 flex items-center justify-center gap-2 mt-6 group"
          >
            <span *ngIf="!loading" class="flex items-center gap-2">
              Iniciar Sesión
              <svg class="w-4 h-4 group-hover:translate-x-0.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
              </svg>
            </span>
            <span *ngIf="loading" class="flex items-center gap-2">
              <svg class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></svg>
              Verificando...
            </span>
          </button>

        </form>

        <!-- Divider -->
      <!--   <div class="relative my-6">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-200 dark:border-[#2D313A]"></div>
          </div>
          <div class="relative flex justify-center text-[11px]">
            <span class="px-3 bg-white dark:bg-[#1C2434] text-gray-400 dark:text-gray-500 font-medium">¿Eres nuevo?</span>
          </div>
        </div> -->

        <!-- Register Link -->
      <!--   <button 
          routerLink="/register"
          class="w-full flex items-center justify-center gap-2 py-2.5 px-4 border border-gray-200 dark:border-[#2D313A] rounded-lg text-sm font-semibold text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-[#171F2C] hover:border-[#3C50E0] dark:hover:border-[#3C50E0] hover:text-[#3C50E0] dark:hover:text-[#3C50E0] transition-all group"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
          </svg>
          Crear una cuenta nueva
        </button> -->

      </div>

      <!-- Footer -->
      <div class="mt-6 space-y-3">
        <div class="flex items-center justify-center gap-1.5 text-[11px] text-gray-400 dark:text-gray-500">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <span>Conexión segura y encriptada</span>
        </div>
        <p class="text-center text-[11px] text-gray-400 dark:text-gray-500">
          © 2026 BELMONTRE - Sistema BPM
        </p>
      </div>

    </div>

  </div>
</ion-content>
